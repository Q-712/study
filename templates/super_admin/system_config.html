{% extends 'base.html' %}

{% block title %}系统配置 - 图书馆借阅系统{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mb-4">系统配置</h2>
    
    <form method="POST" class="mb-4">
        <div class="card mb-4">
            <div class="card-header">
                <h5>系统基本设置</h5>
            </div>
            <div class="card-body">
                <div class="form-group mb-3">
                    <label for="system_name" class="form-label">系统名称</label>
                    <input type="text" class="form-control" id="system_name" name="system_name" value="{{ config_dict.get('system_name', '图书馆借阅系统') }}">
                </div>
                
                <div class="form-group mb-3">
                    <label for="max_borrow_days" class="form-label">最大借阅天数</label>
                    <input type="number" class="form-control" id="max_borrow_days" name="max_borrow_days" value="{{ config_dict.get('max_borrow_days', '30') }}">
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>系统配色方案</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="primary_color" class="form-label">主色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="primary_color" name="primary_color" value="{{ config_dict.get('primary_color', '#007bff') }}" title="选择主色调">
                            <input type="text" class="form-control" id="primary_color_text" name="primary_color" value="{{ config_dict.get('primary_color', '#007bff') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="secondary_color" class="form-label">次要色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="secondary_color" name="secondary_color" value="{{ config_dict.get('secondary_color', '#6c757d') }}" title="选择次要色调">
                            <input type="text" class="form-control" id="secondary_color_text" name="secondary_color" value="{{ config_dict.get('secondary_color', '#6c757d') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="success_color" class="form-label">成功色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="success_color" name="success_color" value="{{ config_dict.get('success_color', '#28a745') }}" title="选择成功色调">
                            <input type="text" class="form-control" id="success_color_text" name="success_color" value="{{ config_dict.get('success_color', '#28a745') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="danger_color" class="form-label">危险色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="danger_color" name="danger_color" value="{{ config_dict.get('danger_color', '#dc3545') }}" title="选择危险色调">
                            <input type="text" class="form-control" id="danger_color_text" name="danger_color" value="{{ config_dict.get('danger_color', '#dc3545') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="warning_color" class="form-label">警告色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="warning_color" name="warning_color" value="{{ config_dict.get('warning_color', '#ffc107') }}" title="选择警告色调">
                            <input type="text" class="form-control" id="warning_color_text" name="warning_color" value="{{ config_dict.get('warning_color', '#ffc107') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="info_color" class="form-label">信息色调</label>
                        <div class="input-group">
                            <input type="color" class="form-control form-control-color" id="info_color" name="info_color" value="{{ config_dict.get('info_color', '#17a2b8') }}" title="选择信息色调">
                            <input type="text" class="form-control" id="info_color_text" name="info_color" value="{{ config_dict.get('info_color', '#17a2b8') }}">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">保存配置</button>
        <a href="{{ url_for('super_admin_dashboard') }}" class="btn btn-secondary">返回仪表盘</a>
    </form>
</div>

<script>
// 当颜色选择器变化时，同步更新文本输入框
const colorInputs = document.querySelectorAll('.form-control-color');
colorInputs.forEach(input => {
    input.addEventListener('input', function() {
        const textInput = this.parentElement.querySelector('input[type="text"]');
        textInput.value = this.value;
    });
});

// 当文本输入框变化时，同步更新颜色选择器
const textInputs = document.querySelectorAll('input[type="text"]');
textInputs.forEach(input => {
    if (input.parentElement.querySelector('.form-control-color')) {
        input.addEventListener('input', function() {
            const colorInput = this.parentElement.querySelector('.form-control-color');
            colorInput.value = this.value;
        });
    }
});
</script>
{% endblock %}
