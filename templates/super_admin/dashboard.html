{% extends 'base.html' %}

{% block title %}超级管理员端 - 知境文本分析系统{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mb-4">超级管理员仪表板</h2>
    
    <div class="row">
        <!-- 管理员管理卡片 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <h5>管理员管理</h5>
                </div>
                <div class="card-body">
                    <p>添加、编辑和删除系统管理员账户。</p>
                    <a href="{{ url_for('super_admin_manage_admins') }}" class="btn btn-primary w-100">管理员管理</a>
                </div>
            </div>
        </div>
        
        <!-- 系统管理卡片 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <h5>系统管理</h5>
                </div>
                <div class="card-body">
                    <p>管理系统的基本设置和配置。</p>
                    <a href="{{ url_for('super_admin_system_config') }}" class="btn btn-primary w-100">系统设置</a>
                </div>
            </div>
        </div>
        
        <!-- 数据统计卡片 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <h5>数据统计</h5>
                </div>
                <div class="card-body">
                    <p>查看系统的整体数据统计和分析。</p>
                    <a href="{{ url_for('super_admin_statistics') }}" class="btn btn-primary w-100">数据统计</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 系统用户统计 -->
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 class="text-primary">👨‍💼</h3>
                    <h5>总管理员数</h5>
                    <p class="display-4">{{ total_admins }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 class="text-success">👤</h3>
                    <h5>总用户数</h5>
                    <p class="display-4">{{ total_users }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 class="text-warning">📄</h3>
                    <h5>总文件数</h5>
                    <p class="display-4">{{ total_files }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
