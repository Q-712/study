{% extends 'base.html' %}

{% block title %}上传文件 - 知境文本分析系统{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mb-4">上传文件</h2>

    <div class="card">
        <div class="card-header">
            <h5>文件信息</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin_upload_file') }}" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label">选择文件</label>
                    <input type="file" class="form-control" id="file" name="file" accept=".pdf,.doc,.docx,.txt,.md" required>
                    <small class="text-muted">支持的文件类型：PDF、DOC、DOCX、TXT、MD</small>
                </div>

                <div class="mb-3">
                    <label for="file_type" class="form-label">文件类型（自动识别，可手动修改）</label>
                    <select class="form-control" id="file_type" name="file_type">
                        <option value="" disabled selected>请选择文件类型或上传文件自动识别</option>
                        <option value="pdf">PDF文档 (.pdf)</option>
                        <option value="doc">Word文档 (.doc)</option>
                        <option value="docx">Word文档 (.docx)</option>
                        <option value="txt">文本文件 (.txt)</option>
                        <option value="md">Markdown文件 (.md)</option>
                    </select>
                    <small class="text-muted">上传文件后系统会自动识别文件类型，您也可以手动选择</small>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">文件描述</label>
                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="请输入文件描述（可选）"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">文件可见性</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="visibility" id="visibility_all" value="all" checked>
                        <label class="form-check-label" for="visibility_all">
                            所有用户可见
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="visibility" id="visibility_specific" value="specific">
                        <label class="form-check-label" for="visibility_specific">
                            指定用户可见
                        </label>
                    </div>

                    <div id="specific_users_div" style="display: none; margin-top: 15px;">
                        <label class="form-label">选择可见用户</label>
                        <select multiple class="form-control" name="visible_users" id="visible_users" size="5">
                            {% for user in available_users %}
                                <option value="{{ user.id }}">{{ user.name }} ({{ user.username }})</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">按住Ctrl键可多选</small>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">上传文件</button>
                    <a href="{{ url_for('admin_manage_files') }}" class="btn btn-secondary ml-2">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const filename = file.name.toLowerCase();
        let fileType = '';

        if (filename.endsWith('.pdf')) {
            fileType = 'pdf';
        } else if (filename.endsWith('.doc')) {
            fileType = 'doc';
        } else if (filename.endsWith('.docx')) {
            fileType = 'docx';
        } else if (filename.endsWith('.txt')) {
            fileType = 'txt';
        } else if (filename.endsWith('.md')) {
            fileType = 'md';
        }

        if (fileType) {
            document.getElementById('file_type').value = fileType;
        }
    }
});

document.querySelectorAll('input[name="visibility"]').forEach(radio => {
    radio.addEventListener('change', function() {
        const specificDiv = document.getElementById('specific_users_div');
        if (this.value === 'specific') {
            specificDiv.style.display = 'block';
            document.getElementById('visible_users').required = true;
        } else {
            specificDiv.style.display = 'none';
            document.getElementById('visible_users').required = false;
        }
    });
});
</script>
{% endblock %}
