{% extends 'base.html' %}

{% block title %}智能问答 - {{ file.original_filename }}{% endblock %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .chat-container {
        width: 100%;
        height: calc(100vh - 180px);
        min-height: 500px;
        background: #FFFFFF;
        border-radius: 16px;
        box-shadow: 0 20px 50px -12px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chat-header {
        padding: 28px 36px 20px;
        background: #FFFFFF;
        border-bottom: 1px solid #EFEDEA;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header h1 {
        font-family: 'Times New Roman', '宋体', serif;
        font-size: 28px;
        font-weight: 400;
        font-style: italic;
        color: #1A1A2E;
    }

    .chat-header .subtitle {
        font-family: 'Times New Roman', '宋体', serif;
        font-size: 12px;
        font-style: italic;
        color: #9E9E9E;
        letter-spacing: 0.5px;
        margin-top: 4px;
    }

    .back-btn {
        padding: 8px 20px;
        background: #F5F4F2;
        color: #4A4A4A;
        text-decoration: none;
        border-radius: 20px;
        font-size: 13px;
        transition: all 0.2s;
    }
    .back-btn:hover {
        background: #E8E6E1;
        text-decoration: none;
        color: #1A1A2E;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 28px 36px;
        background: #FAF9F7;
    }

    .chat-messages::-webkit-scrollbar {
        width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
        background: #F0EFEC;
        border-radius: 10px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
        background: #D9CDC7;
        border-radius: 10px;
    }

    .message {
        margin-bottom: 24px;
        display: flex;
        align-items: flex-start;
        animation: fadeInUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
        justify-content: flex-end;
    }

    .message-content {
        max-width: 70%;
        padding: 14px 22px;
        font-size: 15px;
        line-height: 1.55;
        font-weight: 420;
        letter-spacing: -0.2px;
    }

    .user .message-content {
        background: #1A1A2E;
        color: #FEF9F2;
        border-radius: 28px 28px 10px 28px;
        box-shadow: 0 6px 16px rgba(26,26,46,0.08);
    }

    .assistant .message-content {
        background: #FFFFFF;
        color: #2C2C2C;
        border-radius: 28px 28px 28px 10px;
        border: 1px solid #F0EEEB;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .message-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 12px;
        font-size: 16px;
        flex-shrink: 0;
    }
    .user .message-avatar {
        order: 2;
        background: #F0EFED;
        color: #1A1A2E;
    }
    .assistant .message-avatar {
        background: #FEFAF7;
        color: #E3A99C;
    }

    .chat-input-container {
        padding: 20px 36px 28px;
        background: #FFFFFF;
        border-top: 1px solid #EFEDEA;
        display: flex;
        gap: 14px;
        align-items: center;
    }

    .chat-input {
        flex: 1;
        padding: 14px 24px;
        border: 1px solid #E8E3DE;
        border-radius: 50px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: all 0.2s;
        background: #FEFEFD;
        color: #2C2C2C;
    }
    .chat-input:focus {
        border-color: #E3A99C;
        box-shadow: 0 0 0 3px rgba(227,169,156,0.12);
    }
    .chat-input::placeholder {
        color: #CBC6C0;
    }

    .send-button {
        padding: 14px 32px;
        background: #E3A99C;
        color: #FFFFFF;
        font-weight: 500;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 14px;
        letter-spacing: 0.3px;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(227,169,156,0.2);
    }
    .send-button:hover {
        background: #D19687;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(227,169,156,0.28);
    }
    .send-button:active {
        transform: translateY(0);
    }
    .send-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .typing-indicator {
        display: flex;
        gap: 5px;
        padding: 8px 0;
    }
    .typing-indicator span {
        width: 5px;
        height: 5px;
        background: #E3A99C;
        border-radius: 50%;
        animation: calmWave 1.3s infinite ease-in-out;
    }
    @keyframes calmWave {
        0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
        30% { transform: scale(1); opacity: 1; }
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @media (max-width: 768px) {
        .chat-container {
            border-radius: 20px;
            height: calc(100vh - 140px);
        }
        .chat-header {
            padding: 20px 24px 16px;
        }
        .chat-header h1 {
            font-size: 22px;
        }
        .chat-messages {
            padding: 20px 24px;
        }
        .message-content {
            max-width: 85%;
            padding: 12px 18px;
        }
        .chat-input-container {
            padding: 16px 24px 20px;
        }
    }
</style>

<div class="chat-container">
    <div class="chat-header">
        <div>
            <h1>📖 {{ file.original_filename }}</h1>
            <div class="subtitle">智能问答 · 基于书籍内容</div>
        </div>
        <a href="{{ url_for('user_files') }}" class="back-btn">← 返回列表</a>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-avatar">✧</div>
            <div class="message-content">
                您好！我是您的智能阅读助手。<br>
                我已阅读《{{ file.original_filename }}》，请问您想了解什么？
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <input type="text" class="chat-input" id="messageInput" placeholder="输入您的问题...">
        <button class="send-button" id="sendButton">发送</button>
    </div>
</div>

<script>
    // 等待DOM完全加载
    document.addEventListener('DOMContentLoaded', function() {
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const fileId = {{ file_id }};

        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'assistant');
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '✦' : '✧';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            div.appendChild(avatar);
            div.appendChild(contentDiv);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="message-avatar">✧</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            messageInput.value = '';
            messageInput.disabled = true;
            sendButton.disabled = true;
            showTyping();

            try {
                const response = await fetch('/user/book/analyze/' + fileId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'question=' + encodeURIComponent(msg)
                });

                const data = await response.json();
                hideTyping();
                addMessage(data.response || '暂无回答', false);
            } catch (error) {
                hideTyping();
                addMessage('网络错误，请稍后重试。', false);
                console.error('发送失败:', error);
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // 绑定事件
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);
    });
</script>
{% endblock %}
